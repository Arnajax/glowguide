# Glowguide — Nginx configuration
# Deploy to: /etc/nginx/sites-available/glowguide
# Enable with: ln -s /etc/nginx/sites-available/glowguide /etc/nginx/sites-enabled/
# Test with: nginx -t
# Reload with: systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name glowguide.nl www.glowguide.nl;

    # Redirect www to non-www
    if ($host = www.glowguide.nl) {
        return 301 https://glowguide.nl$request_uri;
    }

    # Redirect HTTP to HTTPS (enable after SSL is configured)
    # return 301 https://$host$request_uri;

    root /var/www/glowguide;
    index index.html;

    # Charset
    charset utf-8;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Main location block
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets (CSS, JS, images)
    location ~* \.(css|js|jpg|jpeg|png|webp|svg|ico|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache sitemap and robots
    location ~* \.(xml|txt)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Custom error pages (optional — create these files if desired)
    # error_page 404 /404.html;
    # error_page 500 502 503 504 /50x.html;
}

